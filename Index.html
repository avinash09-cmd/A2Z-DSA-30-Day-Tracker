<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>A2Z DSA — 30 Day Tracker</title>
<style>
  :root{
    --bg:#0d1117;
    --panel:#161b22;
    --border:#2a313c;
    --text:#c9d1d9;
    --muted:#7d8590;
    --accent:#5fd0a3;
    --accent-dim:#2a5c48;
    --must:#e0a84e;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;
    padding:24px 16px 60px;
  }
  .wrap{max-width:760px;margin:0 auto;}
  header{margin-bottom:22px;}
  .tag{color:var(--accent);font-size:12px;letter-spacing:.15em;text-transform:uppercase;}
  h1{font-size:22px;margin:6px 0 4px;font-weight:600;color:#fff;}
  .sub{color:var(--muted);font-size:13px;margin:0;}

  .progress-shell{
    margin-top:18px;
    border:1px solid var(--border);
    border-radius:6px;
    background:var(--panel);
    padding:12px 14px;
  }
  .progress-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
  .progress-label{font-size:12px;color:var(--muted);}
  .progress-count{font-size:13px;color:var(--accent);}
  .bar-track{height:6px;background:#0a0e13;border-radius:3px;overflow:hidden;border:1px solid var(--border);}
  .bar-fill{height:100%;background:linear-gradient(90deg,var(--accent-dim),var(--accent));width:0%;transition:width .3s ease;}

  .week{margin-top:26px;}
  .week-title{
    font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;
    margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:6px;
  }

  .day{
    border:1px solid var(--border);
    border-radius:6px;
    background:var(--panel);
    padding:12px 14px;
    margin-bottom:8px;
    transition:border-color .2s;
  }
  .day.done{border-color:var(--accent-dim);}
  .day-head{display:flex;align-items:flex-start;gap:10px;cursor:pointer;}
  .day-head input{
    margin-top:3px;
    width:15px;height:15px;
    accent-color:var(--accent);
    cursor:pointer;flex-shrink:0;
  }
  .day-num{color:var(--muted);font-size:11px;min-width:38px;}
  .day-title{font-size:13.5px;color:var(--text);}
  .day.done .day-title{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--accent-dim);}
  .day-detail{font-size:12px;color:var(--muted);margin:6px 0 0 25px;line-height:1.5;}
  .must{color:var(--must);}
  .must-badge{
    display:inline-block;font-size:9.5px;color:var(--must);border:1px solid var(--must);
    border-radius:3px;padding:0px 5px;margin-left:6px;letter-spacing:.05em;vertical-align:1px;
  }

  .reset-row{margin-top:28px;text-align:center;}
  button.reset{
    background:none;border:1px solid var(--border);color:var(--muted);
    font-family:inherit;font-size:11px;padding:6px 12px;border-radius:5px;cursor:pointer;
  }
  button.reset:hover{border-color:var(--must);color:var(--must);}
  .save-note{text-align:center;color:var(--muted);font-size:10.5px;margin-top:8px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="tag">// dsa_sheet.plan</div>
    <h1>A2Z DSA — 30 Day Tracker</h1>
    <p class="sub">Trees, Graphs & DP excluded. Days marked <span class="must-badge">MUST</span> hold the highest-priority problems if you fall behind.</p>
  </header>

  <div class="progress-shell">
    <div class="progress-row">
      <span class="progress-label">progress</span>
      <span class="progress-count" id="count">0 / 30 days</span>
    </div>
    <div class="bar-track"><div class="bar-fill" id="bar"></div></div>
  </div>

  <div id="weeks"></div>

  <div class="reset-row">
    <button class="reset" id="resetBtn">reset all progress</button>
  </div>
  <p class="save-note" id="saveNote">loading saved progress…</p>
</div>

<script>
const DATA = [
  { week:"Week 1 — Foundations + Arrays", days:[
    {n:1, t:"Basics", d:"Patterns, math, recursion intro, hashing. Skim if already solid.", must:false},
    {n:2, t:"Sorting", d:"Bubble, selection, insertion, merge, quick, cycle sort. Understand merge/quick deeply.", must:true},
    {n:3, t:"Arrays — Easy/Medium (1/2)", d:"Kadane's algorithm, Dutch national flag, next permutation.", must:true},
    {n:4, t:"Arrays — Easy/Medium (2/2)", d:"Subarray sum problems, rotate array, leaders in array.", must:true},
    {n:5, t:"Arrays — Hard (1/2)", d:"3-sum, 4-sum, merge intervals.", must:true},
    {n:6, t:"Arrays — Hard (2/2)", d:"Repeat & missing number, count inversions, max product subarray.", must:false},
    {n:7, t:"Revision", d:"Redo 15–20 flagged/hard array problems without looking at solutions.", must:false},
  ]},
  { week:"Week 2 — Binary Search + Strings", days:[
    {n:8, t:"Binary Search (1/2)", d:"1D array search, first/last occurrence, search in rotated sorted array.", must:true},
    {n:9, t:"Binary Search (2/2)", d:"Binary search on answers, median of two sorted arrays.", must:true},
    {n:10, t:"Strings — Basic", d:"Palindrome check, anagram check, isomorphic strings.", must:true},
    {n:11, t:"Strings — Medium", d:"String-to-integer (atoi), longest common prefix, pattern basics.", must:false},
    {n:12, t:"Strings — Hard (1/2)", d:"Z-function / KMP basics — optional if time-tight.", must:false},
    {n:13, t:"Strings — Hard (2/2)", d:"Minimum window substring, Rabin-Karp.", must:false},
    {n:14, t:"Revision", d:"Mixed binary search + string practice, redo flagged problems.", must:false},
  ]},
  { week:"Week 3 — LinkedList + Recursion + Bit Manipulation", days:[
    {n:15, t:"LinkedList — Single/Double", d:"Reverse, cycle detection, middle of LL, merge two sorted LL.", must:true},
    {n:16, t:"LinkedList — continued", d:"Remove Nth node, palindrome LL, intersection point of two LL.", must:false},
    {n:17, t:"LinkedList — Medium/Hard", d:"LRU cache, merge sort on LL, add two numbers as LL.", must:true},
    {n:18, t:"Recursion (1/2)", d:"Subsequences, subsets, combination sum.", must:true},
    {n:19, t:"Recursion (2/2)", d:"Permutations, N-Queens, Sudoku solver.", must:false},
    {n:20, t:"Bit Manipulation", d:"Basic ops, single number problems, power of two, XOR tricks.", must:false},
    {n:21, t:"Revision", d:"Mixed LinkedList + Recursion problems, redo flagged ones.", must:false},
  ]},
  { week:"Week 4 — Stack/Queue + Heaps + Greedy + Final Revision", days:[
    {n:22, t:"Stack & Queue (1/2)", d:"Implementation, next greater/smaller element.", must:true},
    {n:23, t:"Stack & Queue (2/2)", d:"Prefix/infix/postfix conversion, monotonic stack problems.", must:false},
    {n:24, t:"Sliding Window / Two Pointer", d:"Max sliding window, longest substring without repeating characters.", must:true},
    {n:25, t:"Heaps", d:"Implementation, kth largest/smallest, top-k frequent elements, merge k sorted arrays.", must:true},
    {n:26, t:"Greedy", d:"Activity selection, job sequencing, fractional knapsack, N meetings in a room.", must:false},
    {n:27, t:"Tries (optional)", d:"Implementation, word search, prefix matching. Skip first if behind schedule.", must:false},
    {n:28, t:"Revision — Arrays + Strings", d:"Your highest-frequency topics — revisit every flagged problem.", must:true},
    {n:29, t:"Revision — LinkedList + Stack/Queue + Heaps", d:"Redo flagged problems without looking at solutions.", must:false},
    {n:30, t:"Light Revision Only", d:"Go through notes and patterns. No new problems today.", must:false},
  ]},
];

const STORAGE_KEY = "a2z-dsa-tracker-days";
let state = {};

function render(){
  const weeksEl = document.getElementById("weeks");
  weeksEl.innerHTML = "";
  DATA.forEach(wk=>{
    const wkDiv = document.createElement("div");
    wkDiv.className = "week";
    const title = document.createElement("div");
    title.className = "week-title";
    title.textContent = wk.week;
    wkDiv.appendChild(title);

    wk.days.forEach(day=>{
      const dayDiv = document.createElement("div");
      dayDiv.className = "day" + (state[day.n] ? " done" : "");
      dayDiv.innerHTML = `
        <div class="day-head">
          <input type="checkbox" ${state[day.n] ? "checked" : ""} data-day="${day.n}">
          <div>
            <span class="day-num">Day ${day.n}</span>
            <span class="day-title">${day.t}</span>
            ${day.must ? '<span class="must-badge">MUST</span>' : ''}
          </div>
        </div>
        <div class="day-detail">${day.d}</div>
      `;
      wkDiv.appendChild(dayDiv);
    });
    weeksEl.appendChild(wkDiv);
  });

  document.querySelectorAll('input[type="checkbox"]').forEach(cb=>{
    cb.addEventListener("change", async (e)=>{
      const dayNum = e.target.getAttribute("data-day");
      state[dayNum] = e.target.checked;
      await save();
      render();
    });
  });

  updateProgress();
}

function updateProgress(){
  const total = 30;
  const done = Object.values(state).filter(Boolean).length;
  document.getElementById("count").textContent = `${done} / ${total} days`;
  document.getElementById("bar").style.width = `${(done/total)*100}%`;
}

async function save(){
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify(state), false);
    document.getElementById("saveNote").textContent = "progress saved";
  }catch(err){
    document.getElementById("saveNote").textContent = "couldn't save — progress may not persist";
  }
}

async function load(){
  try{
    const result = await window.storage.get(STORAGE_KEY, false);
    state = result ? JSON.parse(result.value) : {};
  }catch(err){
    state = {};
  }
  document.getElementById("saveNote").textContent = "progress syncs automatically";
  render();
}

document.getElementById("resetBtn").addEventListener("click", async ()=>{
  state = {};
  await save();
  render();
});

load();
</script>
</body>
</html>
